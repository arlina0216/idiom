<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>成語填空・手寫練習</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>成語填空</h1>

    <div class="question-area">
      <p class="question-text" id="questionText">三( )兩語</p>
      <p class="hint" id="hint">在下方畫板寫出括號裡的答案</p>
    </div>

    <div class="canvas-wrap">
      <canvas id="canvas" width="280" height="280"></canvas>
      <div class="canvas-actions">
        <button type="button" id="btnClear">清除</button>
        <button type="button" id="btnSubmit">送出</button>
      </div>
    </div>

    <div class="result" id="result" aria-live="polite"></div>
    <div class="nav">
      <button type="button" id="btnNext">下一題</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
